services:
  - type: web
    name: MumTuBackDev
    runtime: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start:prod
    preDeployCommand: npm run prisma:migrate:deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: MumTuDev
          property: connectionString

databases:
  - name: MumTuDev
    plan: free