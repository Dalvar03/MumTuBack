services:
  - type: web
    name: MumTuBackDev
    runtime: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start:render
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false

databases:
  - name: MumTuDev
    plan: free